name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o /tmp/agent-bridge.exe ./cmd/agent-bridge
